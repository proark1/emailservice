name: Deploy to Hetzner

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false   # never cancel a running deploy with a newer one

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script_stop: true
          # All deploy logic lives in deploy/deploy.sh — same script you can run
          # manually on the host. Single source of truth: fixing the deploy means
          # editing one file, not two.
          script: bash /opt/emailservice/deploy/deploy.sh
