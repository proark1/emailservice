name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (typecheck + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test --run

      - name: OpenAPI spec is up to date
        run: pnpm openapi:check

      - name: OpenAPI spec lints clean
        run: pnpm openapi:lint

      - name: SDK typechecks against the spec
        run: pnpm sdk:typecheck

  openapi-breaking-changes:
    name: OpenAPI breaking-change check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          # Need both the PR branch and main to diff against.
          fetch-depth: 0

      - name: Get main's openapi.json
        run: |
          git show origin/${{ github.base_ref }}:openapi.json > /tmp/openapi-base.json || {
            echo "::warning::No openapi.json on base branch — skipping breaking-change check.";
            exit 0;
          }

      - name: Skip if base spec is on a different OpenAPI version
        id: version-check
        run: |
          base_v=$(jq -r '.openapi // "missing"' /tmp/openapi-base.json)
          rev_v=$(jq -r '.openapi // "missing"' openapi.json)
          echo "base=$base_v rev=$rev_v"
          base_major=${base_v%%.*}
          rev_major=${rev_v%%.*}
          if [ "$base_v" != "missing" ] && [ "$base_major.${base_v#*.}" != "$rev_major.${rev_v#*.}" ]; then
            # Even minor version changes (3.0 → 3.1) restructure the schema
            # vocabulary in ways oasdiff treats as breaking but that don't
            # affect the wire protocol. Skip the diff for cross-version PRs;
            # rerun on the next PR once main is on the new version.
            same_minor=$(echo "$base_v $rev_v" | awk '{
              split($1,a,".");
              split($2,b,".");
              print (a[1]"."a[2] == b[1]"."b[2]) ? "yes" : "no"
            }')
            if [ "$same_minor" = "no" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::warning::Base spec is OpenAPI $base_v, revision is $rev_v — skipping oasdiff. Future PRs will diff like-versions cleanly."
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: oasdiff breaking
        if: steps.version-check.outputs.skip != 'true'
        uses: oasdiff/oasdiff-action/breaking@main
        with:
          base: /tmp/openapi-base.json
          revision: openapi.json
          fail-on: ERR
