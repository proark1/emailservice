version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: emailservice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: emailservice
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailservice"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://emailservice:${POSTGRES_PASSWORD}@postgres:5432/emailservice
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
      - "0.0.0.0:2525:2525"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://emailservice:${POSTGRES_PASSWORD}@postgres:5432/emailservice
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  smtp-relay:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/smtp-relay.js"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://emailservice:${POSTGRES_PASSWORD}@postgres:5432/emailservice
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "0.0.0.0:587:587"
      - "0.0.0.0:465:465"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - certs:/app/certs:ro

volumes:
  pgdata:
  redisdata:
  certs:
